<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Agent - Ollama Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* AUTH */
        #auth-page {
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .auth-card {
            background: #1e293b; padding: 40px; border-radius: 16px;
            width: 380px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }
        .auth-card h1 { text-align: center; margin-bottom: 4px; font-size: 28px; }
        .auth-card h1 span { background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card p.sub { text-align: center; color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
        .auth-card input { width: 100%; padding: 12px 16px; margin-bottom: 12px; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: #e2e8f0; font-size: 15px; outline: none; }
        .auth-card input:focus { border-color: #60a5fa; }
        .auth-card button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        .auth-card button:hover { opacity: 0.9; }
        .auth-card .switch { text-align: center; margin-top: 16px; color: #94a3b8; font-size: 14px; }
        .auth-card .switch a { color: #60a5fa; cursor: pointer; text-decoration: none; }
        .auth-error { color: #f87171; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }

        #app { display: none; height: 100vh; flex-direction: column; }

        /* HEADER */
        .header { background: #1e293b; border-bottom: 1px solid #334155; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header h2 { font-size: 18px; }
        .header h2 span { background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .user-info { display: flex; align-items: center; gap: 12px; }
        .header .user-info span { color: #94a3b8; font-size: 14px; }
        .header .logout-btn { padding: 6px 16px; border: 1px solid #475569; border-radius: 8px; background: transparent; color: #cbd5e1; cursor: pointer; font-size: 13px; }
        .header .logout-btn:hover { border-color: #f87171; color: #f87171; }

        /* AGENTS */
        .agents-container {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
            padding: 20px 24px; background: #0f172a;
        }
        .agent-card {
            background: #1e293b; border: 1px solid #334155; border-radius: 16px;
            padding: 16px; cursor: pointer; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .agent-card:hover { transform: translateY(-2px); border-color: #60a5fa; }
        .agent-card.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(59,130,246,0.15); }
        .agent-card .emoji { font-size: 36px; }
        .agent-card .name { font-size: 15px; font-weight: 600; }
        .agent-card .model { font-size: 12px; color: #64748b; }
        .agent-card .status { font-size: 11px; padding: 2px 10px; border-radius: 10px; }
        .agent-card .status.online { background: #065f46; color: #6ee7b7; }
        .agent-card .status.loading { background: #1e3a5f; color: #93c5fd; }
        .agent-card .status.offline { background: #3b1f1f; color: #fca5a5; }

        /* CHAT */
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #0f172a; }

        .agent-info {
            padding: 12px 24px; background: #1e293b; border-bottom: 1px solid #334155;
            display: flex; align-items: center; gap: 12px;
        }
        .agent-info .emoji { font-size: 24px; }
        .agent-info .name { font-weight: 600; }
        .agent-info .model { font-size: 12px; color: #64748b; }

        .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .messages .empty { text-align: center; color: #475569; margin-top: 60px; }
        .messages .empty h3 { font-size: 20px; margin-bottom: 4px; }
        .messages .empty p { font-size: 13px; }

        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
        .message.user { align-self: flex-end; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; border-bottom-right-radius: 4px; }
        .message.agent { align-self: flex-start; background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; }
        .message .label { font-size: 11px; color: #64748b; margin-bottom: 4px; }

        .input-bar { padding: 16px 24px; background: #1e293b; border-top: 1px solid #334155; }
        .input-bar form { display: flex; gap: 12px; }
        .input-bar input { flex: 1; padding: 12px 16px; border: 1px solid #334155; border-radius: 10px; background: #0f172a; color: #e2e8f0; font-size: 15px; outline: none; }
        .input-bar input:focus { border-color: var(--accent, #60a5fa); }
        .input-bar input:disabled { opacity: 0.5; }
        .input-bar button { padding: 12px 24px; border: none; border-radius: 10px; background: var(--accent, #3b82f6); color: white; font-weight: 600; cursor: pointer; font-size: 14px; }
        .input-bar button:hover { opacity: 0.9; }
        .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 900px) {
            .agents-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .agents-container { grid-template-columns: 1fr; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>

<div id="auth-page">
    <div class="auth-card">
        <h1><span>4 Agent</span></h1>
        <p class="sub">Sun&rsquo;iy intellekt bilan suhbat</p>
        <div class="auth-error" id="auth-error"></div>
        <input type="text" id="auth-username" placeholder="Username" autocomplete="username">
        <input type="password" id="auth-password" placeholder="Parol" autocomplete="current-password">
        <button id="auth-btn" onclick="handleAuth()">Kirish</button>
        <div class="switch">
            <span id="auth-switch-text">Akkauntingiz yo'qmi? <a onclick="toggleAuth()">Ro'yxatdan o'tish</a></span>
        </div>
    </div>
</div>

<div id="app">
    <div class="header">
        <h2><span>4 Agent</span> &mdash; Ollama Chat</h2>
        <div class="user-info">
            <span id="username-display"></span>
            <button class="logout-btn" onclick="logout()">Chiqish</button>
        </div>
    </div>

    <div class="agents-container" id="agents-container"></div>

    <div class="main-chat">
        <div class="agent-info" id="agent-info">
            <span class="emoji">🤖</span>
            <span class="name">Agent tanlang</span>
            <span class="model"></span>
        </div>

        <div class="messages" id="messages">
            <div class="empty">
                <h3>Agentni tanlang</h3>
                <p>Yuqoridagi agentlardan birini tanlab, suhbatni boshlang</p>
            </div>
        </div>

        <div class="input-bar">
            <form id="chat-form" onsubmit="sendMessage(event)">
                <input type="text" id="message-input" placeholder="Xabaringizni yozing..." autocomplete="off" disabled>
                <button type="submit" id="send-btn" disabled>Yuborish</button>
            </form>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin;
    let token = localStorage.getItem('token');
    let agents = [];
    let activeAgent = null;
    let loading = false;

    if (token) showApp();

    function showError(msg) {
        const el = document.getElementById('auth-error');
        el.textContent = msg; el.style.display = 'block';
    }

    let isLogin = true;
    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('auth-btn').textContent = isLogin ? 'Kirish' : "Ro'yxatdan o'tish";
        document.getElementById('auth-switch-text').innerHTML = isLogin
            ? 'Akkauntingiz yo\'qmi? <a onclick="toggleAuth()">Ro\'yxatdan o\'tish</a>'
            : 'Akkauntingiz bormi? <a onclick="toggleAuth()">Kirish</a>';
    }

    async function handleAuth() {
        const username = document.getElementById('auth-username').value.trim();
        const password = document.getElementById('auth-password').value;
        if (!username || !password) { showError('Barcha maydonlarni to\'ldiring'); return; }
        const endpoint = isLogin ? '/api/login' : '/api/register';
        try {
            const res = await fetch(API + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!res.ok) { showError(data.detail || 'Xatolik'); return; }
            token = data.access_token;
            localStorage.setItem('token', token);
            showApp();
        } catch(e) { showError('Serverga ulanishda xatolik'); }
    }

    async function showApp() {
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        await loadUser();
        await loadAgents();
    }

    function logout() {
        localStorage.removeItem('token'); token = null;
        document.getElementById('app').style.display = 'none';
        document.getElementById('auth-page').style.display = 'flex';
        document.getElementById('auth-password').value = '';
    }

    async function loadUser() {
        try {
            const res = await fetch(API + '/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
            if (!res.ok) { logout(); return; }
            const data = await res.json();
            document.getElementById('username-display').textContent = data.username;
        } catch(e) { logout(); }
    }

    async function loadAgents() {
        try {
            const res = await fetch(API + '/api/agents', { headers: { 'Authorization': 'Bearer ' + token } });
            const data = await res.json();
            agents = data.agents;
            renderAgents();
        } catch(e) {}
    }

    function renderAgents() {
        const container = document.getElementById('agents-container');
        container.innerHTML = '';
        agents.forEach(a => {
            const card = document.createElement('div');
            card.className = 'agent-card' + (activeAgent && activeAgent.id === a.id ? ' active' : '');
            card.style.setProperty('--accent', a.color);
            card.innerHTML = `
                <div class="emoji">${a.emoji}</div>
                <div class="name">${a.name}</div>
                <div class="model">${a.model}</div>
                <div class="status online" data-agent="${a.id}">Tayyor</div>
            `;
            card.onclick = () => selectAgent(a);
            container.appendChild(card);
            checkModel(a);
        });
    }

    async function checkModel(agent) {
        try {
            const res = await fetch(API + '/api/models', { headers: { 'Authorization': 'Bearer ' + token } });
            const data = await res.json();
            const status = document.querySelector(`.status[data-agent="${agent.id}"]`);
            if (data.models && data.models.includes(agent.model)) {
                status.textContent = 'Tayyor'; status.className = 'status online';
            } else {
                status.textContent = 'Yuklanmoqda...'; status.className = 'status loading';
            }
        } catch(e) {}
    }

    function selectAgent(agent) {
        activeAgent = agent;
        document.getElementById('agents-container').querySelectorAll('.agent-card').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.agent-card').forEach(c => {
            const idx = Array.from(document.querySelectorAll('.agent-card')).indexOf(c);
            if (agents[idx] && agents[idx].id === agent.id) c.classList.add('active');
        });

        document.getElementById('agent-info').innerHTML = `
            <span class="emoji">${agent.emoji}</span>
            <span class="name" style="color:${agent.color}">${agent.name}</span>
            <span class="model">${agent.model}</span>
        `;
        document.getElementById('message-input').disabled = false;
        document.getElementById('send-btn').disabled = false;
        document.getElementById('message-input').placeholder = `${agent.name} ga xabar yozing...`;
        document.getElementById('messages').innerHTML = `
            <div class="empty">
                <h3>${agent.emoji} ${agent.name} bilan suhbat</h3>
                <p>${agent.color === '#3b82f6' ? 'Umumiy savollar' : agent.color === '#10b981' ? 'Kod va dasturlash' : agent.color === '#f59e0b' ? 'Matn va ijod' : 'Mantiq va falsafa'}</p>
            </div>
        `;
        document.querySelector('.input-bar form').style.setProperty('--accent', agent.color);
        document.getElementById('send-btn').style.background = agent.color;
    }

    async function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById('message-input');
        const msg = input.value.trim();
        if (!msg || loading || !activeAgent) return;
        input.value = '';

        const messagesDiv = document.getElementById('messages');
        const empty = messagesDiv.querySelector('.empty');
        if (empty) empty.remove();

        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.innerHTML = msg;
        messagesDiv.appendChild(userDiv);

        const asstDiv = document.createElement('div');
        asstDiv.className = 'message agent';
        asstDiv.innerHTML = `<div class="label" style="color:${activeAgent.color}">${activeAgent.emoji} ${activeAgent.name}</div>`;
        asstDiv.style.borderColor = activeAgent.color;
        messagesDiv.appendChild(asstDiv);

        loading = true;
        document.getElementById('send-btn').disabled = true;
        input.disabled = true;

        try {
            const res = await fetch(API + '/api/agent/' + activeAgent.id + '/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ model: activeAgent.model, message: msg, history: [] })
            });
            if (!res.ok) { asstDiv.innerHTML += '<br>Xatolik yuz berdi'; loading = false; document.getElementById('send-btn').disabled = false; input.disabled = false; return; }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                const text = decoder.decode(value);
                const lines = text.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.content) { fullText += data.content; asstDiv.innerHTML = '<div class="label" style="color:' + activeAgent.color + '">' + activeAgent.emoji + ' ' + activeAgent.name + '</div>' + escapeHtml(fullText); messagesDiv.scrollTop = messagesDiv.scrollHeight; }
                        } catch(e) {}
                    }
                }
            }
        } catch(e) { asstDiv.innerHTML += '<br>Ulanish xatoligi'; }

        loading = false;
        document.getElementById('send-btn').disabled = false;
        input.disabled = false;
    }

    function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
</script>
</body>
</html>
