services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xoleric-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-xoleric-jwt-secret-change-me}
      - DATABASE_URL=sqlite:///./data/books.db
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - backend_data:/app/data
      - ./books:/app/books

  frontend:
    image: nginx:alpine
    container_name: xoleric-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: xoleric-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    profiles:
      - optional

volumes:
  backend_data:
  ollama_data:
