<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOLƎRIƆ WEN BOOK</title>
    
    <!-- PWA / META -->
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/manifest+json,{
        &quot;name&quot;: &quot;XOLERIC&quot;,
        &quot;short_name&quot;: &quot;XOLERIC&quot;,
        &quot;start_url&quot;: &quot;.&quot;,
        &quot;display&quot;: &quot;fullscreen&quot;,
        &quot;background_color&quot;: &quot;#050505&quot;,
        &quot;theme_color&quot;: &quot;#050505&quot;,
        &quot;icons&quot;: [{
            &quot;src&quot;: &quot;data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000000'/%3E%3Ccircle cx='50' cy='50' r='40' fill='%23FFB800' stroke='%2300F0FF' stroke-width='4'/%3E%3Ctext x='50' y='75' font-size='60' text-anchor='middle' fill='%23000' font-family='Arial' font-weight='bold'%3EX%3C/text%3E%3C/svg%3E&quot;,
            &quot;sizes&quot;: &quot;192x192 512x512&quot;,
            &quot;type&quot;: &quot;image/svg+xml&quot;
        }]
    }">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none !important;
            -webkit-user-select: none !important;
            -webkit-touch-callout: none !important;
        }

        :root {
            --bg-deep: #050505;
            --bg-panel: #0a0a0f;
            --bg-card: #111217;
            
            --accent-gold: #FFB800;
            --accent-glow: rgba(255, 184, 0, 0.25);
            --accent-cyan: #00F0FF;
            
            --text-main: #ffffff;
            --text-muted: #8f9bb3;
            
            --border-light: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(255, 184, 0, 0.3);
            
            --font-size: 18px;
            --radius-xl: 32px;
            --radius-full: 60px;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            transition: filter 0.4s ease;
        }

        body.blur-mode {
            filter: blur(30px) grayscale(90%);
            pointer-events: none;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* WELCOME SCREEN */
        #welcomeScreen {
            z-index: 10000;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 70% 30%, #1f1b0c 0%, #050505 90%);
        }

        #welcomeScreen.hide {
            opacity: 0;
            transform: scale(1.2);
            pointer-events: none;
        }

        .login-card {
            width: 88%;
            max-width: 380px;
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 44px 28px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-cyan), var(--accent-gold), transparent);
            filter: blur(2px);
        }

        .logo-big {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #fff, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .logo-small {
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 6px;
            margin-bottom: 48px;
            text-transform: uppercase;
        }

        .input-glass {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            padding: 18px 24px;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 24px;
            outline: none;
            backdrop-filter: blur(4px);
        }

        .input-glass:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-neon {
            background: linear-gradient(135deg, var(--accent-gold), #e5a500);
            border: none;
            border-radius: var(--radius-full);
            padding: 18px 24px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1.5px;
            color: #000;
            cursor: pointer;
            box-shadow: 0 12px 30px var(--accent-glow);
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-neon:active {
            transform: scale(0.95);
            box-shadow: 0 6px 20px var(--accent-gold);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-full);
            padding: 18px 24px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        .btn-outline:active {
            background: rgba(255,255,255,0.05);
            transform: scale(0.97);
        }

        /* MAIN SCREEN */
        #mainScreen {
            transform: translateX(0);
            background: radial-gradient(ellipse at top, #0f0f14, var(--bg-deep));
        }

        #mainScreen.hide {
            transform: translateX(-100%);
        }

        .header {
            padding: 24px 24px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            padding: 8px 20px;
            font-weight: 600;
            color: var(--accent-gold);
        }

        .search-section {
            padding: 12px 24px 20px;
        }

        .search-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            padding: 16px 24px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            backdrop-filter: blur(4px);
        }

        .categories-section {
            padding: 0 24px 20px;
        }

        .categories-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            padding: 10px 24px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            color: var(--text-muted);
            white-space: nowrap;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .category-chip.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: #000;
            font-weight: 600;
        }

        .books-grid {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 100px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .book-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .book-card:active {
            transform: scale(0.98);
            border-color: var(--accent-gold);
            background: var(--bg-card);
        }

        .book-card.last-read {
            border-left: 4px solid var(--accent-gold);
        }

        .book-info { flex: 1; }
        .book-number {
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .book-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: white;
        }
        .book-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            font-size: 1.2rem;
            border: 1px solid rgba(0,240,255,0.2);
        }

        /* READER SCREEN */
        #readerScreen {
            transform: translateY(100%);
            z-index: 2000;
        }

        #readerScreen.show {
            transform: translateY(0);
        }

        .reader-header {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 600px;
            background: rgba(10,10,15,0.8);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 6px 6px 24px;
            z-index: 250;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .reader-title-small {
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 45%;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .header-btn:active {
            background: var(--accent-gold);
            color: black;
        }

        /* ZOOM PANEL - HORIZONTAL RULETKA */
        .zoom-panel {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            width: 280px;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 24px;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .zoom-panel.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .zoom-value {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 300;
            color: var(--accent-gold);
            margin-bottom: 16px;
        }

        .zoom-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            outline: none;
        }

        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--accent-gold);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-gold);
        }

        .scroll-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .pull-indicator {
            position: absolute;
            top: -60px; left: 0; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 60px;
            color: var(--accent-cyan);
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 100;
        }

        .pull-line {
            width: 40px; height: 3px;
            background: var(--accent-cyan);
            border-radius: 3px;
            margin-bottom: 8px;
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        .reader-content {
            padding: 120px 24px 100px;
            max-width: 720px;
            margin: 0 auto;
            font-size: var(--font-size);
            line-height: 1.8;
            color: #e0e4f0;
        }

        .reader-content h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 48px;
            text-align: center;
        }

        .reader-content p {
            margin-bottom: 28px;
            text-align: justify;
            padding: 8px 0;
        }

        .reader-content p.active {
            border-left: 3px solid var(--accent-gold);
            padding-left: 20px;
            background: rgba(255,184,0,0.05);
        }

        /* PROGRESS SCALE */
        .scale-section {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 140px;
            background: rgba(10,10,12,0.95);
            backdrop-filter: blur(30px);
            border-top: 1px solid var(--border-light);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 16px 0 8px;
        }

        .scale-header {
            display: flex;
            justify-content: space-between;
            padding: 0 24px 12px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .scale-left {
            display: flex;
            gap: 16px;
        }

        .scale-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .scale-dot {
            width: 8px; height: 8px;
            border-radius: 8px;
        }
        .scale-dot.current { background: var(--accent-gold); box-shadow: 0 0 10px var(--accent-gold); }
        .scale-dot.total { background: var(--text-muted); }

        .scale-wrapper {
            position: relative;
            width: 100%;
            height: 100px;
            overflow: hidden;
        }

        .center-marker {
            position: absolute;
            left: 50%; top: 15px;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            pointer-events: none;
        }

        .triangle {
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 12px solid var(--accent-gold);
            filter: drop-shadow(0 0 8px var(--accent-gold));
            margin-bottom: 20px;
        }

        .center-line {
            width: 2px; height: 40px;
            background: var(--accent-gold);
            box-shadow: 0 0 10px var(--accent-gold);
        }

        .scale-container {
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            width: 100%;
            padding: 0 calc(50% - 5px);
            scrollbar-width: none;
            align-items: flex-end;
            cursor: pointer;
        }

        .scale-container::-webkit-scrollbar { display: none; }

        .tick {
            min-width: 2px;
            margin: 0 4px;
            position: relative;
            display: flex;
            justify-content: center;
            transition: all 0.2s;
        }
        .tick.short {
            height: 20px;
            background: rgba(255,255,255,0.2);
        }
        .tick.long {
            height: 35px;
            background: var(--accent-gold);
            box-shadow: 0 0 8px var(--accent-gold);
            min-width: 3px;
        }
        .tick-value {
            position: absolute;
            top: -35px;
            color: var(--text-muted);
            font-size: 14px;
            white-space: nowrap;
        }
        .tick.long .tick-value {
            color: var(--accent-gold);
        }

        .scale-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 0;
        }

        .current-para {
            color: white;
            font-size: 0.9rem;
        }
        .current-para span { color: var(--accent-gold); font-weight: 600; }

        .play-btn-scale {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .play-btn-scale:active { background: rgba(255,255,255,0.1); transform: scale(0.95); }
        .play-btn-scale svg { width: 20px; height: 20px; fill: white; }
        .play-btn-scale.pulse { animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,184,0,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255,184,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,184,0,0); }
        }

        .toast {
            position: fixed;
            bottom: 100px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 14px 28px;
            color: white;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .toast.show { opacity: 1; visibility: visible; }

        .hide { display: none !important; }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <!-- WELCOME SCREEN -->
    <div id="welcomeScreen" class="screen">
        <div class="login-card">
            <div class="logo-big">XOLERIC</div>
            <div class="logo-small">50 KITOB</div>
            <input type="text" id="userNameInput" class="input-glass" placeholder="Ismingiz" autocomplete="off">
            <div class="btn-group">
                <button class="btn-neon" id="startBtn">KIRISH</button>
                <button class="btn-outline" id="continueLastBtn">OXIRGI KITOB</button>
            </div>
        </div>
    </div>

    <!-- MAIN SCREEN -->
    <div id="mainScreen" class="screen hide">
        <div class="header">
            <div class="logo">XOLERIC</div>
            <div class="badge" id="displayUserName">MEHMAN</div>
        </div>
        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="Qidirish...">
        </div>
        <div class="categories-section">
            <div class="categories-scroll" id="categories">
                <div class="category-chip active" data-cat="all">Barchasi</div>
                <div class="category-chip" data-cat="1">1-10</div>
                <div class="category-chip" data-cat="2">11-20</div>
                <div class="category-chip" data-cat="3">21-30</div>
                <div class="category-chip" data-cat="4">31-40</div>
                <div class="category-chip" data-cat="5">41-50</div>
            </div>
        </div>
        <div class="books-grid" id="booksGrid"></div>
    </div>

    <!-- READER SCREEN -->
    <div id="readerScreen" class="screen">
        <div class="reader-header">
            <div class="reader-title-small" id="readerTitle">Kitob</div>
            <div class="header-actions">
                <div class="header-btn" id="backBtn">←</div>
                <div class="header-btn" id="zoomBtn">Aa</div>
            </div>
        </div>

        <!-- HORIZONTAL ZOOM PANEL (RULETKA) -->
        <div class="zoom-panel" id="zoomPanel">
            <div class="zoom-value" id="zoomValue">18</div>
            <input type="range" class="zoom-slider" id="zoomSlider" min="14" max="36" value="18">
        </div>

        <div class="scroll-area" id="scrollArea">
            <div class="pull-indicator" id="pullIndicator">
                <div class="pull-line"></div>
                YOPISH
            </div>
            <div class="reader-content" id="readerContent">
                <h1 id="readTitle"></h1>
                <div id="readBody"></div>
            </div>
        </div>

        <!-- PROGRESS SCALE -->
        <div class="scale-section" id="scaleSection">
            <div class="scale-header">
                <div class="scale-left">
                    <div class="scale-item"><div class="scale-dot current"></div><span id="currentParaDisplay">1</span></div>
                    <div class="scale-item"><div class="scale-dot total"></div><span id="totalParaDisplay">0</span></div>
                </div>
                <div id="scalePercentage">0%</div>
            </div>
            <div class="scale-wrapper">
                <div class="center-marker"><div class="triangle"></div><div class="center-line"></div></div>
                <div class="scale-container" id="scaleContainer"></div>
            </div>
            <div class="scale-footer">
                <div class="current-para"><span id="currentParaText">1</span> / <span id="totalParaText">0</span></div>
                <div class="play-btn-scale" id="scalePlayBtn">
                    <svg id="scalePlayIcon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <svg id="scalePauseIcon" viewBox="0 0 24 24" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toastMessage"></div>

    <script>
        // ==================== 50 TA TO'LIQ KITOB (barcha matnlar bilan) ====================
        const BOOKS = [
            { id: 0, title: "1. Mukammallik Kuchi: Kichik Odatlar", category: 1, 
              content: `<p>Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. "Atomic Habits" konsepsiyasi shuni uqtiradiki, inson o'z ustida har kuni atigi bir foiz (1%) yaxshilanishga erishsa, yil oxiriga kelib u 37 barobar kuchliroq, aqlliroq va tajribaliroq shaxsga aylanadi.</p><p>Aksariyat insonlar motivatsiyaga tayanib ish ko'radilar. Ammo motivatsiya bu vaqtinchalik hissiy holatdir. Haqiqiy va bardavom natijaga erishish uchun insonga motivatsiya emas, balki qat'iy intizom va to'g'ri ishlab chiqilgan tizim kerak. Maqsad belgilash g'oliblar va mag'lublar o'rtasidagi farqni belgilamaydi, chunki ikkalasining ham maqsadi g'alaba qozonishdir.</p><p>Yangi odatni shakllantirish uchun psixologiyada maxsus zanjir mavjud: signal, istak, javob va mukofot. Yaxshi odatlarni shakllantirish uchun ularni ko'zga tashlanadigan, jozibador, bajarishga oson va qoniqarli qilish zarur. Salbiy odatlardan qutulish uchun esa buning aynan teskarisini qilish talab etiladi.</p><p>Atrof-muhitingiz sizning xulq-atvoringizni belgilaydigan eng kuchli omildir. Agar diqqatni jamlashni istasangiz, ishlash xonangizdan chalg'ituvchi hamma narsani olib tashlang. Bu oddiy qoida hayotingizni tubdan o'zgartirishi mumkin.</p><p>Biz o'zimiz istagan odamga aylanishimiz uchun, avvalo e'tiqodimizni va o'zimizga bo'lgan qarashimizni o'zgartirishimiz lozim. O'zgarishning eng chuqur qatlami bu "Men kimman?" degan savolga beriladigan javobdir. O'zingizni shunchaki kitob o'qiyotgan odamdek emas, balki "kitobxon" sifatida his qiling.</p>` },
            { id: 1, title: "2. Kiberxavfsizlik va Tarmoq", category: 1,
              content: `<p>Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi maxfiy ma'lumotlar almashinuvini himoya qilishning murakkab va uzluksiz ilmiy tizimidir. Har bir soniyada dunyo bo'ylab millionlab zararli kodlar va xakerlik hujumlari tarmoqlarni sinovdan o'tkazmoqda.</p><p>Kiberhimoyaning asosi operatsion tizimlarning ichki tuzilishini chuqur tushunishdan boshlanadi. Tizimdagi ochiq portlar, zaif protokollar va kodlardagi kichik mantiqiy xatolar tajribali axloqiy xakerlar (ethical hackers) tomonidan doimiy ravishda penetratsion testlar (pentest) orqali tekshirilib boriladi. Ularning asosiy maqsadi – jinoyatchi xakerlardan (qora shlyapalar) oldin tizimdagi darchalarni topish va ularni yamashdir.</p><p>Ma'lumotlar bazasiga inyeksiya hujumlari (SQLi), saytlararo skriptlash (XSS) va ijtimoiy muhandislik kabi usullar bugungi kundagi eng keng tarqalgan tahdidlardan hisoblanadi. Ijtimoiy muhandislik texnologiyaga emas, to'g'ridan-to'g'ri inson psixologiyasiga hujum qiladi. Ya'ni, insonlarning ishonchuvchanligi, qo'rquvi yoki qiziqishlaridan foydalanib, tizim parollarini o'g'irlash usulidir.</p><p>Shuning uchun ham axborot xavfsizligida eng zaif halqa bu kompyuter emas, insonning o'zidir. Kriptografiya, ya'ni ma'lumotlarni shifrlash san'ati ushbu sohaning yadrosidir. Simmetrik va asimmetrik shifrlash algoritmlari orqali bizning yozishmalarimiz va bank amaliyotlarimiz xavfsiz holatda qoladi.</p><p>Kiberxavfsizlik mutaxassisi bo'lish nafaqat yuqori texnik bilimlarni, balki nostandart fikrlash qobiliyatini va katta sabr-toqatni ham talab etadi. Bu ko'rinmas raqamli frontda har kuni jang boradi va xavfsizlik hech qachon 100% kafolatlanmaydi, u shunchaki doimiy xavfni minimallashtirish jarayonidir.</p>` },
            { id: 2, title: "3. Moliyaviy Savodxonlik", category: 1,
              content: `<p>Boylikning haqiqiy o'lchovi bu sizning qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz va uni kelajak uchun saqlab qola olishingiz bilan o'lchanadi. Moliyaviy erkinlik insonning ishlash uchun emas, yashash uchun pul topish tizimini yo'lga qo'ygan holatidir. Buning asosiy siri moliyaviy savodxonlik, ya'ni aktiv va passiv tushunchalarini to'g'ri farqlashda yashirin.</p><p>Kambag'al va o'rta sinf insonlari o'zlariga asosan "passivlar" sotib olishadi va buni boylik deb o'ylashadi. Masalan, kreditga olingan qimmatbaho avtomobil, eng so'nggi rusumdagi telefon yoki hashamatli uy sizning cho'ntagingizdan har oy pul olib chiqib ketadi. Haqiqiy boylar esa "aktivlar" yig'adilar. Aktivlar — bu o'z-o'zidan cho'ntagingizga pul keltiruvchi narsalar: biznes, qimmatli qog'ozlar, intellektual mulk yoki ijaraga beriladigan ko'chmas mulkdir.</p><p>Murakkab foiz (compound interest) atamasi iqtisodiyotdagi sakkizinchi mo'jiza hisoblanadi. Agar siz yoshlikdan boshlab muntazam ravishda kichik summalarni sarmoya qilib borsangiz, yillar o'tib bu sarmoya o'zining foizlari hisobiga eksponensial tarzda o'sishni boshlaydi. Sarmoya kiritishda asosiysi — pulni vaqt bilan hamkorlikda ishlashiga imkon berishdir.</p><p>Daromadingizning kamida 10 foizini o'zingizning kelajagingiz uchun saqlab qolish eng oltin moliyaviy qoidadir. Moliyaviy xotirjamlik faqat raqamlarda emas, insonning hayotga munosabatida namoyon bo'ladi. Atrofdagilarga maqtanib yashash istagidan voz kechish, keraksiz xarajatlarni qisqartirish va byudjetni to'g'ri taqsimlash asab tizimingizni ham himoya qiladi.</p><p>Har bir sarflanayotgan so'm sizning moliyaviy armiyangizning bir askaridir. Ularni behuda o'limga yo'llash o'rniga, ko'proq pul topib kelishi uchun jangga yuboring. Bu oddiy qoida sizni moliyaviy erkinlik sari yetaklaydi.</p>` },
            { id: 3, title: "4. Chuqur Diqqat: Fokus", category: 1,
              content: `<p>Hozirgi axborot texnologiyalari asrida chalg'ituvchi omillar shu qadar ko'pki, bitta vazifaga to'liq diqqatni jamlab ishlash noyob va o'ta qimmatbaho qobiliyatga aylanib bormoqda. Kardiologik operatsiya qilayotgan shifokor yoki murakkab tizim kodini yozayotgan dasturchi uchun diqqat – ularning eng asosiy qurolidir. "Chuqur ish" (Deep Work) tushunchasi insonning o'z aqliy sig'imini maksimal darajada ishlatib, hech qanday chalg'ishlarsiz murakkab qadriyat yaratish holatini anglatadi.</p><p>Aksariyat odamlar kunini elektron pochtalarga javob berish, ijtimoiy tarmoqlardagi tasmasini varaqlash va qisqa videolarni ko'rish bilan, ya'ni "yuzaki ishlar" (shallow work) bilan o'tkazadilar. Yuzaki ishlar odamga faqat bandlik hissini beradi, ammo iqtisodiy va shaxsiy jihatdan hech qanday katta qiymat yaratmaydi. Chuqur diqqat holatiga kirish uchun iroda kuchining o'zi yetarli emas, buning uchun raqamli gigiyena va maishiy tartibni o'rnatish lozim.</p><p>Inson miyasi ko'p vazifalilikni (multitasking) yoqtirmaydi. Bir vaqtning o'zida ham musiqa eshitish, ham xabar yozish, ham kitob o'qish aslo mumkin emas. Miya shunchaki bir vazifadan ikkinchisiga o'ta tezlik bilan sakraydi va bu jarayonda u juda ko'p energiya yo'qotadi, natijada ish sifati keskin pasayadi. Fokusni bitta nuqtaga qaratish miyadagi neyron aloqalarni mustahkamlaydi va miyelinizatsiya jarayonini tezlashtiradi.</p><p>Telefoningizdagi bildirishnomalarni (notifications) to'liq o'chirib qo'yish, ishlash uchun aniq soatlarni belgilash va vaqti-vaqti bilan butunlay zerikishga ruxsat berish diqqat mushaklarini chiniqtiradi. Ijodiy va aqliy mehnat bilan shug'ullanuvchilar o'z miyalariga xuddi professional sportchilar o'z tanalariga munosabatda bo'lgandek e'tibor qaratishlari kerak.</p><p>Atrofdagi dunyodan uzilib qolishdan qo'rqmang, aslida eng muhim kashfiyotlar yolg'izlik va chuqur tafakkur mevasidir. Diqqatni boshqarish qobiliyati XXI asrning eng muhim mahoratidir.</p>` },
            { id: 4, title: "5. Kosmik Olam va Koinot", category: 1,
              content: `<p>Koinot shu qadar ulkan va sirli ki, inson aqli uning o'lchamlarini to'liq tasavvur qilishga ojizdir. Biz tungi osmonga boqib ko'radigan yulduzlarning nuri bizgacha yetib kelishi uchun yillar, hatto millionlab yillar kerak bo'ladi. Bu degani, biz har safar yulduzlarga qaraganimizda aslida o'tmishni, ularning ming yillar oldingi holatini ko'rayotgan bo'lamiz. Koinot tinimsiz kengaymoqda va bu jarayon galaktikalar orasidagi masofani tobora uzoqlashtirmoqda.</p><p>Koinotdagi eng qiziqarli va haligacha to'liq o'rganilmagan obyektlardan biri bu — qora tuynuklardir (Black holes). Ular yulduzlar o'z hayotini yakunlab, ulkan portlashdan (o'ta yangi yulduz portlashi) so'ng o'z ichiga qulab tushishi natijasida hosil bo'ladi. Qora tuynukning tortishish kuchi shu qadar kuchliki, undan hatto eng tezkor narsa — yorug'lik ham qochib qutula olmaydi. Uning markaziga yaqinlashgan sari vaqt sekinlashadi, bu "vaqt diletatsiyasi" deb ataladi.</p><p>Biz yashayotgan Quyosh tizimi Somon Yo'li (Milky Way) galaktikasining faqatgina bitta kichik chekkasida joylashgan. Olimlarning kuzatishlariga ko'ra, koinotda yuz milliarddan ortiq galaktikalar mavjud. Bu bizga shu narsani anglatadiki, yerdan tashqarida, boshqa ekzosayyoralarda ham hayot bo'lish ehtimoli matematik jihatdan juda ham yuqori.</p><p>Odamzotning Marsni o'zlashtirish va yulduzlararo sayohatga tayyorgarlik ko'rishi uning koinotdagi zaxira rejasidir. Koinot sirlarini o'rganish nafaqat astrofizika, balki falsafiy ahamiyatga ham ega. Koinot miqyosida olib qaraganda, yer yuzidagi urushlar, tashvishlar va muammolar mutlaqo ahamiyatsiz, bitta kichik chang zarrasi ustidagi tartibsizlik bo'lib ko'rinadi.</p><p>Yulduzlar ortidagi cheksizlik insonni tavoze'li bo'lishga va atrofidagi hayotning naqadar noyob mo'jiza ekanini qadrlashga o'rgatadi. Zero, bizning tanamizdagi har bir atom ham qachondir portlagan yulduzlarning qoldiqlaridan bunyod bo'lgan.</p>` },
            { id: 5, title: "6. Veb-Dasturlash Arxitekturasi", category: 1,
              content: `<p>Zamonaviy veb-dasturlash shunchaki brauzerda ochiladigan oddiy sahifalar yaratishdan ancha uzoqlashgan. Bugungi kunda u insonlar hayotini osonlashtiruvchi, global miqyosda ishlovchi murakkab raqamli ilovalar qurish san'atidir. Har bir mukammal ishlangan veb-sayt ortida yuzlab soatlik mehnat, mantiqiy yechimlar va foydalanuvchi tajribasini (UX) yaxshilashga qaratilgan tinimsiz izlanishlar yotadi.</p><p>Frontend (foydalanuvchi ko'radigan qism) va Backend (server va mantiq qismi) o'rtasidagi uyg'unlik mukammal dastur ishlashining kafolatidir. Shisha effektlari (Glassmorphism), silliq animatsiyalar va hatto veb-ilovalar ichidagi terminal interfeyslari kabi innovatsion yechimlar foydalanuvchilarni o'ziga jalb qiladi. Orqa fonda ishlaydigan server qismi esa ma'lumotlarni xavfsiz saqlashi, minglab so'rovlarni bir vaqtning o'zida tezkorlik bilan qayta ishlashi kerak.</p><p>Dasturlash tillari va freymvorklar dasturchilarga o'z g'oyalarini cheklovlarsiz amalga oshirish imkonini beradi. Ilovalar yaratishda interaktivlik eng muhim omillardan biridir. Foydalanuvchining har bir bosgan tugmasi, kiritgan ma'lumoti zudlik bilan algoritm tomonidan tahlil qilinib, tegishli reaksiya qaytarilishi kerak.</p><p>Shuningdek, loyihaning kelajakdagi kengayuvchanligi (scalability) uning poydevoriga bog'liq. Dastur kodlarini toza, tartibli va boshqalar tushunishi oson qilib yozish (Clean Code) chinakam muhandislik madaniyatidir. Raqamli arxitekturada interfeys dizayni san'at bilan texnologiyaning birlashgan nuqtasidir.</p><p>Qorong'i rejimlar (Dark Mode) va ko'zni charchatmaydigan ranglar palitrasi foydalanuvchining dasturdan uzoq vaqt qulay foydalanishini ta'minlaydi. Veb-dasturlash faqatgina texnik qoidalar to'plami emas, u ijodkor insonlar o'z dunyosini yaratishi va uni butun insoniyat bilan ulashishi uchun cheksiz maydondir.</p>` },
            { id: 6, title: "7. Kiberhimoya va Tahlil", category: 1,
              content: `<p>Bugungi kunda har qanday tashkilotning eng muhim boyligi bu uning ma'lumotlar bazasidir. Kiberxavfsizlik ana shu axborotlarni uchinchi shaxslar hujumidan himoya qiluvchi murakkab tizimdir. Tarmoq xavfsizligini ta'minlashda tizimning ichki mexanizmlarini chuqur anglash va zaifliklarni (vulnerabilities) oldindan aniqlash hal qiluvchi ahamiyatga ega. Buning uchun xavfsizlik mutaxassislari doimiy ravishda kod tahlili (Code Analysis) va tarmoq trafigini monitoring qilib borishlari talab etiladi.</p><p>Ushbu jarayonda maxsus tayyorlangan operatsion tizimlar va vositalar katta rol o'ynaydi. Xususan, tarmoq xavfsizligini tekshirish uchun mo'ljallangan platformalarda (masalan, penetratsion test tizimlarida) o'nlab maxsus dastalardan foydalaniladi. Mutaxassislar ushbu vositalar yordamida ochiq portlarni skanerlash, paketlarni ushlab qolish va veb-ilovalardagi mavjud bo'shliqlarni topish orqali "axloqiy xakerlik" (Ethical Hacking) amaliyotini o'taydilar.</p><p>Maqsad – tizimni buzish emas, uning qalqonini mustahkamlashdir. Veb xavfsizlik haqida gap ketganda, SQL inyeksiya va XSS (Cross-Site Scripting) kabi hujum turlari doim birinchi o'ringa chiqadi. Tajribali muhandislar har bir yozilgan kod qatorini ana shunday xavflarga qarshi tekshiradilar. Ilova va server o'rtasidagi ma'lumotlar almashinuvi to'liq shifrlangan (encrypted) bo'lishi va ruxsatsiz kirishlarga qattiq cheklov qo'yilishi shart.</p><p>Xavfsizlik sohasini o'rganish kishidan yuksak mantiqiy va tahliliy fikrlashni talab qiladi. Dastur kodlarining qanday ishlashini to'liq anglamasdan turib, uni himoya qilish imkonsizdir. Kiberxavfsizlik mutaxassisi nafaqat himoyachi, balki kiber-hujumchining psixologiyasini va texnikalarini tushuna oladigan strateg bo'lishi kerak.</p><p>Bu jarayon zamonaviy texnologiyalarning eng qiziqarli va sirli yo'nalishlaridan biridir. Har bir yangi hujum turi bilan himoya mexanizmlari ham takomillashib boradi.</p>` },
            { id: 7, title: "8. Ovoz Muhandisligi: Phonk", category: 1,
              content: `<p>Musiqa yaratish jarayoni bugungi kunda faqatgina cholg'u asboblarini chalish bilan cheklanmaydi; u to'liq raqamli muhandislik va fizika san'atiga aylangan. Ovoz to'lqinlarini boshqarish, chastotalarni o'zaro moslashtirish va tinglovchiga hissiy ta'sir ko'rsatish zamonaviy musiqaning asosidir. Xususan, elektron musiqa va so'nggi yillarda katta trendga chiqqan Phonk janri o'zining o'zgacha atmosferasi va kuchli basslari (808s) bilan ajralib turadi.</p><p>Phonk janrining ildizlari nostaljik vokal sempllari, sintezatorlar va o'ta ritmik zarbli (drum) partiyalarga tayanadi. Bu yo'nalishda trek yaratish (Beatmaking) ijodkordan nafaqat musiqiy did, balki dasturiy ta'minotlarni chuqur bilishni ham talab qiladi. Raqamli audio stansiyalarida (DAW) har bir tovush o'zining alohida yo'lagiga ega bo'lib, ular umumiy spektrda bir-biriga xalaqit bermasligi uchun ekvalayzer (EQ) yordamida sinchkovlik bilan tozalanadi.</p><p>Instrumental musiqa hech qanday so'zlarsiz ham inson ruhiyatiga kuchli ta'sir qila oladi. Kuchli bass ritmlari odamga energiya va motivatsiya bersa, sekinlashgan melodiya qismlari chuqur o'yga toldiradi. Miksing va mastering jarayonlarida kompressorlar va to'lqin saturatsiyasidan to'g'ri foydalanish trekni chinakam professional darajaga olib chiqadi.</p><p>Tovush effekti shunchaki shovqin emas, u his-tuyg'ularning raqamli ko'rinishidir. Bugungi kunda musiqiy prodyuserlar kuchli kompyuterlar va ochiq kodli muhitlarda ham bemalol ijod qila olishmoqda. Eng muhimi — g'oya va tovushlar arxitekturasini his qila olish. Ovoz to'lqinlari bilan ishlash matematika va san'atning ajoyib uchrashuv nuqtasidir.</p><p>U ijodkorga o'zining ichki olamini butun dunyoga eshittirish imkonini beradi. Phonk esa bugungi kunda eng tez rivojlanayotgan janrlardan biridir.</p>` },
            { id: 8, title: "9. Raqamli Savodxonlik", category: 1,
              content: `<p>Kelajak avlodni tarbiyalashda an'anaviy usullarning o'rni beqiyos, biroq bugungi raqamli asr bolalarning e'tiborini jalb qilish uchun yangicha, interaktiv yondashuvlarni talab qiladi. Bolalarga o'qish va yozishni o'rgatuvchi zamonaviy dasturlar ularning qabul qilish xususiyatlariga to'liq moslashtirilgan bo'lishi kerak. Quruq matnlar va zerikarli qoidalardan voz kechib, jarayonni vizual o'yin darajasiga olib chiqish yuqori samaradorlikni ta'minlaydi.</p><p>Savodxonlikni oshirishga qaratilgan veb-ilovalar bolalar psixologiyasini inobatga olgan holda yaratiladi. Ularda ranglarning to'g'ri tanlanishi, harflarning animatsiyalar bilan harakatlanishi va to'g'ri javob uchun beriladigan rag'batlar bolaning miyasida ijobiy bog'lanishlarni shakllantiradi. Bolalar mantiqiy mashqlarni bajarish jarayonida o'zlarini imtihon topshirayotgandek emas, balki qiziqarli virtual sarguzashtda ishtirok etayotgandek his qiladilar.</p><p>Bunday dasturlarning eng kuchli tomoni shundaki, ular har bir foydalanuvchining o'zlashtirish tezligiga qarab avtomatik moslasha oladi. Algoritm bola qaysi harflar yoki bo'g'inlarda xato qilayotganini tahlil qiladi va xuddi shaxsiy ustoz kabi aynan shu bo'shliqlarni to'ldirishga qaratilgan vazifalarni taqdim etadi.</p><p>Ovozli yordamchilar yordamida harflarning to'g'ri talaffuzini eshitish esa vizual va audio xotirani bir vaqtda ishga tushiradi. Raqamli vositalar orqali ta'lim berish faqatgina maktabgacha ta'lim bilan cheklanib qolmaydi, balki mustaqil fikrlash, qaror qabul qilish va texnologiyalar bilan to'g'ri muloqot qilish ko'nikmalarini ham o'rgatadi.</p><p>Yaratilayotgan har bir shunday ta'limiy platforma kelajak poydevoriga qo'yilgan ulkan hissadir. Ta'lim va texnologiya birlashganda, bilim olish eng sevimli mashg'ulotga aylanadi.</p>` },
            { id: 9, title: "10. Sun'iy Intellekt Asoslari", category: 1,
              content: `<p>Sun'iy intellekt (AI) insoniyat tarixidagi eng ulug'vor kashfiyotlardan biriga aylanib ulgurdi. Bir necha o'n yillar oldin u faqatgina fantastika hisoblangan bo'lsa, bugun u kundalik hayotimizning ajralmas mexanizmi. Mashinali o'rganish (Machine Learning) va neyrotarmoqlar kompyuterlarga biz yozib bergan qat'iy qoidalarsiz ham ma'lumotlarni tahlil qilish va qaror qabul qilish imkonini bermoqda. Bu algoritmik inqilob iqtisodiyotdan tortib tibbiyotgacha bo'lgan barcha sohalarni o'zgartirmoqda.</p><p>Neyrotarmoqlar inson miyasidagi milliardlab neyronlarning ishlash prinsipiga asoslanadi. Dasturga millionlab tasvirlar, matnlar yoki ovozlar kiritilganda, u o'z-o'zidan qonuniyatlarni qidirib topadi. "Chuqur o'rganish" (Deep Learning) texnologiyasi orqali AI tizimlari xatolardan saboq chiqarishga va o'zining bashorat qilish qobiliyatini doimiy ravishda takomillashtirishga qodir.</p><p>Bugun AI xuddi inson kabi rasm chizishi, murakkab matnlar yozishi va hatto dastur kodlarini optimallashtirishi mumkin. Biroq bu imkoniyatlar katta mas'uliyatni ham talab qiladi. Sun'iy intellekt tizimlarining kiberxavfsizligi, shaxsiy ma'lumotlarning daxlsizligi kabi axloqiy va texnik masalalar olimlarni jiddiy o'ylantirmoqda.</p><p>Agar algoritm noto'g'ri ma'lumotlar ustida o'qitilsa, uning qabul qiladigan qarorlari ham xato bo'ladi. Shu sababli, inson omili AI rivojlanishida doim nazorat rolini o'ynashi shart. Texnologiyaning bu darajada tez rivojlanishi bizga shuni ko'rsatadiki, yaqin kelajakda inson mashinalar bilan raqobatlashmaydi, balki ular bilan hamkorlikda ishlashni o'rganadi.</p><p>AI – inson aql-zakovatini almashtiruvchi vosita emas, balki uni ming karra kuchaytiruvchi eng mukammal quroldir. Biz raqamli evolyutsiyaning aynan markazida turibmiz va bu davrni o'rganish kishiga beqiyos ustunlik beradi.</p>` },
            { id: 10, title: "11. Kvant Fizikasi Mo'jizalari", category: 2,
              content: `<p>Kvant fizikasi — bu koinotning eng mitti zarrachalari qanday ishlashini o'rganuvchi fan bo'lib, u bizning voqelik haqidagi an'anaviy tasavvurlarimizni butunlay ost-ust qilib yuboradi. Klassik fizikadan farqli o'laroq, kvant olamida jismlar bir vaqtning o'zida ikkita joyda bo'lishi (superpozitsiya) yoki bir-biri bilan koinotning ikki chekkasida turib ham bir zumda aloqa qilishi (kvant chalkashligi) mumkin. Bu hodisalar inson aqliga sig'masdek ko'rinsa-da, bugungi kundagi barcha zamonaviy texnologiyalarning, xususan smartfonlar va lazerlarning ishlash asosi hisoblanadi.</p><p>Kvant olamining eng mashhur tajribalaridan biri "Ikki yoriqli tajriba" (Double-slit experiment) hisoblanadi. Bu tajriba shuni ko'rsatdiki, yorug'lik va elektronlar ham to'lqin, ham zarracha xususiyatiga ega. Eng qizig'i shundaki, zarrachaning o'zini qanday tutishi uni "kuzatuvchi" bor yoki yo'qligiga qarab o'zgaradi. Ya'ni, inson ongi yoki o'lchov asbobi koinotdagi subatomik darajadagi jarayonlarga bevosita ta'sir o'tkaza oladi.</p><p>Bu fizika va falsafa o'rtasidagi chegaralarni xiralashtirib yuboradi. Bugungi kunda olimlar kvant kompyuterlarini yaratish ustida qizg'in ish olib bormoqdalar. Oddiy kompyuterlar ma'lumotlarni 0 va 1 (bitlar) ko'rinishida qayta ishlasa, kvant kompyuterlari "kubit"lardan foydalanadi. Kubitlar bir vaqtning o'zida ham 0, ham 1 holatida bo'la olgani uchun, bunday kompyuterlarning hisoblash tezligi tasavvur qilib bo'lmaydigan darajada yuqori bo'ladi.</p><p>Ular zamonaviy kriptografiyani buzib kirishga va murakkab kasalliklarga da'vo topish uchun kerakli kimyoviy birikmalarni soniyalar ichida hisoblab chiqishga qodir. Kvant fizikasi bizga koinot qat'iy qoidalarga emas, balki ehtimolliklarga qurilganini o'rgatadi. Borliq faqat biz uni kuzatganimizdagina aniq bir holatga keladi.</p><p>Bu sohani o'rganish insoniyatni nafaqat texnologik jihatdan, balki ruhiy va intellektual jihatdan ham mutlaqo yangi bosqichga olib chiqadi. Biz koinotning ko'rinmas matosini endigina tushuna boshladik.</p>` },
            { id: 11, title: "12. Vaqtni Boshqarish San'ati", category: 2,
              content: `<p>Vaqt — inson hayotidagi yagona qaytarib bo'lmaydigan va sotib olinmaydigan resursdir. Boy va kambag'al, yosh va qari — barchaga bir kunda aynan 24 soat beriladi. Ammo nima uchun ba'zilar bu vaqt ichida ulkan ishlarni amalga oshiradi-yu, boshqalar hatto kundalik yumushlariga ham ulgurmaydi? Buning siri vaqtning o'zida emas, balki diqqatni va ustuvorliklarni (priorities) to'g'ri taqsimlay olishdadir. Vaqtni boshqarish (Time Management) aslida o'z-o'zini boshqarish demakdir.</p><p>Samaradorlikning eng mashhur usullaridan biri bu Eyzenxauer matritsasidir. Bu tizim barcha ishlarni 4 toifaga ajratadi: muhim va shoshilinch, muhim lekin shoshilinch emas, muhim emas lekin shoshilinch, shuningdek, muhim ham, shoshilinch ham bo'lmagan ishlar. Insoniyatning eng katta xatosi shundaki, biz ko'pincha o'z kelajagimiz uchun eng foydali bo'lgan (muhim, lekin shoshilinch bo'lmagan) ishlarni ortga suramiz va kunimizni ahamiyatsiz, lekin "shoshilinch" bo'lib ko'ringan muammolarni hal qilishga sarflaymiz.</p><p>Miya bir vaqtning o'zida uzoq muddat diqqatni ushlab tura olmaydi. "Pomodoro" texnikasi aynan shu muammoni hal qiladi: 25 daqiqa to'liq diqqat bilan ishlash va 5 daqiqa qat'iy dam olish. Ushbu qisqa tanaffuslar miyani charchoqdan asraydi va kun davomida yuqori ishchanlikni saqlab qolishga yordam beradi. Ishlayotgan vaqtda barcha chalg'ituvchi omillarni (ijtimoiy tarmoqlar, telefon qo'ng'iroqlari) to'liq bloklash ushbu texnikaning asosiy shartidir.</p><p>Raqamli minimalizm ham zamonaviy vaqtni boshqarishning muhim qismiga aylandi. Telefon ekraniga tikilib o'tkazilgan har bir soat sizning orzularingizdan o'g'irlangan vaqtdir. Kuningizni oldindan rejalashtirish, katta maqsadlarni kichik va oson bajariladigan qadamlarga bo'lish o'zingizga bo'lgan ishonchni oshiradi.</p><p>Vaqtni samarali boshqarish insonga hayotining haqiqiy egasi ekanligini his qilish imkonini beradi. Har bir daqiqa qadriga yetish baxtli hayotning kalitidir.</p>` },
            { id: 12, title: "13. Psixologiya: Ong Sirlari", category: 2,
              content: `<p>Inson miyasi koinotdagi eng murakkab va sirli obyektlardan biridir. Uning atigi 1.5 kilogramm keladigan biologik massasi butun boshli sivilizatsiyalarni yaratishga, hissiyotlarni boshdan kechirishga va borliqni anglashga qodir. Psixologiya ana shu ongli va ongsiz jarayonlarni o'rganuvchi fandir. Biz qabul qilayotgan har bir qaror, har bir xatti-harakatimiz ortida o'zimiz ham sezmaydigan chuqur psixologik sabablar yotadi.</p><p>Inson ongi ikkita asosiy qismdan iborat: ongli (ratsional) va ongsiz (subconscious) qism. Psixologlarning ta'kidlashicha, bizning kundalik hayotdagi harakatlarimizning qariyb 95% ongsiz ravishda, ya'ni avtopilot rejimida amalga oshiriladi. Bolalikda olingan tajribalar, qo'rquvlar va jamiyat tomonidan singdirilgan qarashlar aynan shu ongsiz qatlamda saqlanadi va hayotimizni ko'rinmas iplar orqali boshqaradi.</p><p>O'z-o'zini anglash esa ana shu iplarni kesib tashlash va qarorlarni ochiq idrok bilan qabul qilish yo'lidagi ilk qadamdir. Kognitiv xatolar (Cognitive Biases) miyamizning axborotni tezroq qayta ishlash uchun ishlatadigan "qisqa yo'llari" hisoblanadi. Masalan, inson har doim o'z fikrini tasdiqlovchi ma'lumotlarni qidiradi va bunga zid keladigan faktlarni inkor etadi (Tasdiqlash xatosi).</p><p>Bunday mantiqiy xatolarni bilish va ularni nazorat qila olish insonni manipulyatsiyalardan, reklama hiylalaridan va noto'g'ri xulosalardan asraydi. Tanqidiy fikrlash bugungi axborot asrida qolish uchun eng zarur psixologik qalqondir. Miya neyroplastiklik (Neuroplasticity) xususiyatiga ega. Bu shuni anglatadiki, bizning miyamiz qotib qolgan tosh emas; u inson hayoti davomida yangi narsalarni o'rganish, tajriba va xulq-atvor orqali o'zining fizik strukturasini o'zgartira oladi.</p><p>Yomon odatlarni tashlash va yangi qobiliyatlarni o'zlashtirish har qanday yoshda ham mumkin. Inson o'z fikrlarini boshqarishni o'rganganda, butun hayoti uning nazoratiga o'tadi.</p>` },
            { id: 13, title: "14. Kriptovalyuta Inqilobi", category: 2,
              content: `<p>Iqtisodiyot tarixiga nazar tashlasak, pul tizimi doimiy ravishda evolyutsiya qilib kelganini ko'ramiz: tovar ayirboshlashdan tortib, oltin tangalarga, so'ngra qog'oz pullarga va elektron raqamlarga. Bugungi kunda esa moliyaviy dunyo navbatdagi katta inqilob — markazlashmagan raqamli pullar, ya'ni kriptovalyutalar davriga qadam qo'ydi. Bitcoin yaratilishi bilan markaziy banklarga va hukumatlarga qaram bo'lmagan, erkin va ochiq moliya tizimi g'oyasi haqiqatga aylandi.</p><p>Kriptovalyutalarning ishlash mexanizmi "Blokcheyn" (Blockchain) texnologiyasiga asoslanadi. Blokcheyn — bu axborotni saqlashning shunday usuliki, unda ma'lumotlar zanjir ko'rinishida, butun dunyodagi minglab kompyuterlarda bir vaqtning o'zida saqlanadi. Agar kimdir ma'lumotlar bazasini o'zgartirmoqchi yoki soxtalashtirmoqchi bo'lsa, tarmoqdagi qolgan barcha kompyuterlar buni darhol sezadi va rad etadi. Bu texnologiya har qanday tranzaksiyaning 100% xavfsiz, shaffof va o'zgartirib bo'lmasligini ta'minlaydi.</p><p>An'anaviy qog'oz pullar (fiat pullar) inflatsiya xavfi ostida bo'ladi, chunki davlatlar istalgan vaqtda ularni qo'shimcha chop etishi mumkin. Bitcoin kabi kriptovalyutalar esa algoritm orqali qat'iy cheklangan (masalan, Bitcoin faqat 21 million dona chiqarilishi mumkin). Shu sababli uni tez-tez raqamli oltinga qiyoslashadi. Odamlar endilikda vositachilarsiz (banklar va to'lov tizimlarisiz) dunyoning narigi chekkasidagi inson bilan to'g'ridan-to'g'ri savdo qilish imkoniyatiga ega.</p><p>Biroq kriptovalyuta bozori o'zining yuqori o'zgaruvchanligi (volatilligi) bilan ham ajralib turadi. Keskin ko'tarilishlar va pasayishlar sarmoyadorlardan kuchli psixologik tayyorgarlik va texnik tahlil bilimlarini talab qiladi. Blokcheyn texnologiyasi faqatgina pul tizimini emas, balki logistika, tibbiyot, saylov tizimlari va avallari ishonch muammosi bo'lgan barcha sohalarni o'zgartirish potensialiga ega.</p><p>Kelajak aynan shaffoflik va raqamli erkinlik tamoyillariga quriladi. Bu inqilobning markazida turish katta imkoniyatlar eshigini ochadi.</p>` },
            { id: 14, title: "15. Bionika: Tabiat Dizayni", category: 2,
              content: `<p>Bionika (yoki biomimetika) — tabiatdagi biologik mexanizmlarni va ularning ishlash prinsiplarini o'rganib, ularni zamonaviy texnologiyalarga tadbiq etuvchi kelajak fanidir. Tabiat millionlab yillik evolyutsiya davomida mukammal dizayn va yechimlarni yaratgan. Muhandislar va olimlar bugungi kunda bu tayyor "xaritalar" dan foydalanib, insoniyatning eng qiyin muammolariga innovatsion yechimlar topmoqdalar.</p><p>Eng mashhur bionik kashfiyotlardan biri bo'lmish "Velkro" (yopishtirgich lenta) oddiygina qariqiz o'simligining itlar va kiyimga yopishib qolish xususiyatini o'rganish natijasida kashf qilingan. Xuddi shuningdek, Yaponiyadagi eng tezkor poezdlarning (Bullet trains) tumshug'i baliqchi qushning (Kingfisher) tumshug'i shaklida dizayn qilingan. Bu shakl poezdga tunnellardan o'tayotganda havo qarshiligini yengish va shovqinni keskin kamaytirish imkonini berdi.</p><p>Bionikaning eng katta inqilobi tibbiyot sohasida yuz bermoqda. Hozirgi kunda yo'qotilgan qo'l yoki oyoqlar o'rniga o'rnatiladigan bionik protezlar oddiy plastik yoxud metall bo'laklari emas. Ular to'g'ridan-to'g'ri insonning asab tizimiga ulanadi va miyadan kelayotgan impulslarni o'qib, barmoqlarni xuddi tirik organdek harakatga keltiradi.</p><p>Neuralink kabi neyro-interfeys loyihalari orqali esa kelajakda inson miyasini to'g'ridan-to'g'ri kompyuter va internet tarmog'iga ulash imkoniyati yaratilmoqda. Tabiat aslo keraksiz energiya sarflamaydi, uning har bir yaratgan mavjudoti mukammal ekologik muvozanatda ishlaydi.</p><p>Olimlar o'rgimchak to'ridan po'latdan besh barobar kuchliroq bo'lgan sintetik tolalar yaratmoqdalar, kapalaklarning qanot tuzilishidan esa o'z-o'zini tozalaydigan sirtlar va samarali quyosh panellari ixtiro qilinmoqda. Bionika bizga insoniyat o'zini tabiatning hokimi emas, balki uning o'quvchisi sifatida ko'rishi kerakligini isbotlab beradi.</p>` },
            { id: 15, title: "16. Nanotexnologiya", category: 2,
              content: `<p>Nanotexnologiya — bu moddalarni atom va molekula darajasida (1 dan 100 nanometrgacha bo'lgan o'lchamda) boshqarish va yangi xususiyatlarga ega materiallar yaratish fanidir. Tasavvur qilish uchun, bir nanometr soch tolasidan qariyb 100,000 marta yupqaroqdir. Bu o'lchamda moddalarning fizik va kimyoviy xususiyatlari butunlay o'zgaradi. Masalan, oddiy sharoitda elektr tokini o'tkazmaydigan materiallar nano-darajada ajoyib o'tkazgichlarga aylanishi mumkin.</p><p>Nanotexnologiyaning eng katta yutuqlaridan biri uglerod nanotrubkalari va grafenning kashf etilishidir. Grafen po'latdan 200 barobar kuchli, ammo undan bir necha barobar yengil va shaffof bo'lgan bir atom qalinligidagi uglerod qatlamidir. Ushbu material kelajakda bukiluvchan elektronika qurilmalari, o'ta yengil samolyotlar va hatto Yerdan koinotga olib chiquvchi kosmik liftlar (space elevator) qurish uchun asosiy xomashyo bo'lishi kutilmoqda.</p><p>Tibbiyot sohasida nanotexnologiya mutlaqo yangi davrni boshlab berdi. Nanorobotlar va aqlli dori tashuvchi nano-zarrachalar to'g'ridan-to'g'ri inson qon aylanish tizimiga kiritilib, faqatgina kasallangan (masalan, saraton) hujayralarni topib, ularga aniq zarba bera oladi. Bu an'anaviy kimyoterapiya kabi butun tanaga zarar yetkazuvchi usullarni tarixda qoldiradi.</p><p>Kichik molekulyar mashinalar inson DNKsidagi xatolarni to'g'rilashgacha bo'lgan ishlarni bajarish imkoniyatiga ega. Shu bilan birga, nanotexnologiyalar atrof-muhitni tozalashda ham muhim rol o'ynaydi. Suvni ifloslanishlardan tozalovchi nano-filtrlar va quyosh energiyasini deyarli 100% samaradorlik bilan elektrga aylantiruvchi panellar iqlim muammolariga yechim bo'lishi mumkin.</p><p>Biroq, bu texnologiyaning xavfli tomonlari ham yo'q emas: nazoratdan chiqqan o'z-o'zini ko'paytiruvchi nanorobotlar (grey goo ssenariysi) xavfi olimlar tomonidan hamon jiddiy o'rganilmoqda.</p>` },
            { id: 16, title: "17. Ekologiya: Sayyora Kelajagi", category: 2,
              content: `<p>Yer sayyorasi o'zining 4.5 milliard yillik tarixi davomida ko'plab iqlim o'zgarishlarini boshdan kechirgan. Biroq, so'nggi ikki asr ichida, xususan Sanoat inqilobidan keyin yuz berayotgan global isish jarayoni to'g'ridan-to'g'ri inson faoliyati bilan bog'liqdir. Qazib olinuvchi yoqilg'ilarning (ko'mir, neft, gaz) katta miqdorda yoqilishi oqibatida atmosferaga milliardlab tonna karbonat angidrid (CO2) va boshqa issiqxona gazlari ajralib chiqmoqda, bu esa sayyoramizni gigant issiqxonaga aylantirmoqda.</p><p>Global isishning oqibatlari nafaqat havo haroratining ko'tarilishida, balki butun ekotizimning buzilishida namoyon bo'lmoqda. Arktika va Antarktidadagi muzliklarning erishi dunyo okeani sathining ko'tarilishiga, qirg'oqbo'yi hududlari va orol davlatlarning suv ostida qolishiga olib keladi. Okeanlarning kislotalashuvi esa Yer yuzidagi kislorodning katta qismini ishlab chiqaruvchi fitoplanktonlar va marjon riflarining (coral reefs) ommaviy qirilishiga sabab bo'lmoqda.</p><p>Bu global inqirozdan chiqishning yagona yo'li qazib olinuvchi yoqilg'ilardan to'liq voz kechib, qayta tiklanuvchi energiya manbalariga (quyosh, shamol, geotermal va gidroenergetika) o'tishdir. Hozirgi kunda quyosh panellari va shamol turbinalarining narxi keskin arzonlashib, ularning samaradorligi ortib bormoqda. Shuningdek, o'rmonlarni qayta tiklash va sirkulyar iqtisodiyotga o'tish orqali tabiatdagi uglerod balansi tiklanishi mumkin.</p><p>Iqlim o'zgarishi faqatgina hukumatlar va yirik korporatsiyalarning muammosi emas, u har bir shaxsning kundalik tanlovlariga ham bog'liq. Sayyorani asrab qolish uchun iste'mol madaniyatini o'zgartirish, go'sht mahsulotlari iste'molini me'yorga keltirish, chiqindilarni qayta ishlash va resurslardan oqilona foydalanish zarur.</p><p>Tabiat bizsiz ham mavjud bo'la oladi, ammo insoniyat tabiatning muvozanatisiz omon qola olmaydi. Bu bizning eng muhim mas'uliyatimizdir.</p>` },
            { id: 17, title: "18. Metaolam va Virtual Reallik", category: 2,
              content: `<p>Internetning evolyutsiyasi endilikda ikki o'lchamli ekranlardan chiqib, bizni to'liq qamrab oluvchi uch o'lchamli fazoga — Metaolamga (Metaverse) ko'chib o'tmoqda. Virtual reallik (VR) va To'ldirilgan reallik (AR) texnologiyalari orqali insonlar raqamli olamni xuddi jismoniy dunyodagidek his qilish imkoniyatiga ega bo'lmoqdalar. Agar hozirda biz internetga kompyuter yoki telefon orqali "qarasak", kelajakda biz maxsus ko'zoynaklar yordamida internetning "ichiga" kiramiz.</p><p>Virtual reallik (VR) sizni butunlay yangi, yopiq raqamli dunyoga olib kirsa, To'ldirilgan reallik (AR) jismoniy dunyo ustiga raqamli qatlamni tushiradi (masalan, ko'zoynagingiz ekranida ob-havo, navigatsiya yoki boshqa ma'lumotlarning real vaqtda ko'rinib turishi). Bu texnologiyalar avvaliga faqat video o'yinlar industriyasi uchun qiziqarli ko'ringan bo'lsa, bugungi kunda ular ta'lim, arxitektura, muhandislik va tibbiyot kabi sohalarda inqilob qilmoqda.</p><p>Masalan, jarrohlar VR yordamida murakkab operatsiyalarni avval virtual bemorlarda mashq qilmoqdalar. Metaolam kelajakdagi yangi raqamli iqtisodiyotning markaziga aylanadi. Odamlar o'zlarining virtual avatariga ega bo'lib, raqamli ofislarda ishlaydilar, virtual ko'chmas mulk va kiyim-kechaklar (NFT texnologiyasi asosida) sotib oladilar va virtual konsertlarda qatnashadilar.</p><p>Masofadan ishlash endilikda zerikarli video qo'ng'iroqlar orqali emas, balki bir stolda o'tirgandek hissini beruvchi gologrammalar vositasida amalga oshiriladi. Biroq, bu utopik ko'ringan texnologiyaning psixologik va ijtimoiy xatarlari ham yo'q emas. Insonlarning haqiqiy jismoniy dunyodan uzilib, to'liq virtual olamga qochib o'tishi (escapism) chuqur depressiya va yolg'izlikka olib kelishi mumkin.</p><p>Texnologiya insonlarni bir-biriga yaqinlashtirishi kerak, ammo biz uni to'g'ri boshqara olmasak, u haqiqiy insonga xos bo'lgan mehr-oqibat va jonli muloqotni o'ldiruvchi omilga aylanishi hech gap emas.</p>` },
            { id: 18, title: "19. Avtomobilsozlik Evolyutsiyasi", category: 2,
              content: `<p>Yuz yildan ortiq vaqt davomida insoniyatning asosiy transport vositasi bo'lib kelgan ichki yonuv dvigatellari o'z o'rnini elektromobillarga (EV) bo'shatib bermoqda. Bu avtomobilsozlik tarixidagi eng katta va eng tezkor texnologik inqilobdir. Elektromobillarning asosiy ustunligi nafaqat ularning ekologik tozaligi, balki tuzilishining o'ta soddaligidadir. Oddiy avtomobilda minglab harakatlanuvchi mexanik qismlar bo'lsa, elektromobilda ular bir necha o'ntani tashkil etadi, bu esa avtomobilning ishonchliligini keskin oshiradi.</p><p>Hozirgi kunda bu sohaning eng muhim kurash maydoni akkumulyatorlar texnologiyasidir. Litiy-ion batareyalar o'rnini tez orada qattiq jismli (solid-state) batareyalar egallashi kutilmoqda. Ular orqali avtomobillar bir marta quvvatlanish bilan ming kilometrdan ortiq masofani bosa oladi va atigi 5-10 daqiqa ichida to'liq quvvatga to'ladi. Bu o'zgarishlar dunyo bo'ylab neftga bo'lgan qaramlikni yo'qotadi va geopolitik o'zgarishlarga sabab bo'ladi.</p><p>Avtomobil sanoatining navbatdagi katta sakrashi bu — Avtonom boshqaruv (Self-driving) texnologiyasidir. Kameralar, radarlar va LiDAR datchiklari yordamida atrof-muhitni o'ta aniqlik bilan skaner qiluvchi mashinalar sun'iy intellekt orqali insonlardan ko'ra xavfsizroq va tezroq qaror qabul qilmoqda. To'liq avtonom mashinalar ommalashgach, inson omili tufayli sodir bo'ladigan yo'l-transport hodisalari deyarli 99% ga qisqaradi.</p><p>Kelajakning transport tizimi biz tasavvur qilgandan ham farqli bo'ladi. Avtomobillarga shaxsiy mulk sifatida emas, balki xizmat sifatida (Mobility as a Service) qarash boshlanadi. Tungi vaqtda sizning aqlli mashinangiz o'z-o'zidan taksi sifatida ishlab, sizga pul topib kelishi yoki shahardagi tirbandliklar algoritmlar yordamida butunlay bartaraf etilishi mumkin.</p><p>Mashinalar endi shunchaki temir ulov emas, balki g'ildirakli superkompyuterlarga aylandi. Bu evolyutsiya tez sur'atlar bilan davom etmoqda.</p>` },
            { id: 19, title: "20. Tibbiyotda Gen Tahriri", category: 2,
              content: `<p>Tibbiyot sohasi inson umrini uzaytirish va hayot sifatini yaxshilashda doim eng ilg'or fan bo'lib kelgan, ammo bugungi kundagi texnologik integratsiya uni fantastika darajasiga olib chiqdi. An'anaviy jarrohlik o'rnini asta-sekin robot-jarrohlar (masalan, da Vinci jarrohlik tizimi) egallamoqda. Bu tizim orqali jarroh xonaning narigi chekkasida yoki hatto boshqa qit'ada turib ham joystiklar yordamida amaliyot o'tkazishi mumkin. Robot qo'llar inson qo'lida kuzatiladigan titroqlarni (tremor) yo'qotadi va o'ta murakkab mikroxirurgik ishlarni millimetr aniqlikda bajaradi.</p><p>Tibbiyotdagi eng katta biologik inqilob bu CRISPR-Cas9 — gendagi o'zgarishlarni tahrirlash texnologiyasidir. Bu texnologiya olimlarga DNK zanjiridagi xato yoki kasallikka sabab bo'luvchi qismni xuddi kompyuterdagi "qirqib olib, o'rniga yopishtirish" (cut and paste) funksiyasi kabi o'zgartirish imkonini beradi. Bu kashfiyot saraton, Altsgeymer va nasliy qon kasalliklari kabi minglab davosiz dardlarga butunlay chek qo'yish potensialiga ega.</p><p>Sun'iy intellektning tibbiyotga kirib kelishi diagnostika jarayonini tubdan o'zgartirdi. AI algoritmlari millionlab rentgen, MRT va KT suratlarini tahlil qilib, inson ko'zi ilg'ay olmaydigan eng kichik o'simtalar yoki anomaliyalarni dastlabki bosqichdayoq aniqlab bermoqda. Kasallikni uni davolash qiyinlashganidan so'ng emas, balki u paydo bo'lishidan avval prognoz qilish — zamonaviy profilaktik tibbiyotning asosiy maqsadiga aylandi.</p><p>Shaxsiylashtirilgan tibbiyot (Personalized medicine) davri boshlanmoqda. Endilikda hammaga bir xil dori yozib berilmaydi, balki har bir insonning shaxsiy genetik xaritasi tahlil qilinib, aynan uning organizmiga 100% mos keladigan davo usullari qo'llaniladi.</p><p>Insoniyat qarish jarayonini sekinlashtirish va hatto to'xtatish (anti-aging) sirlarini ochish ostonasida turibdi, bu esa yaqin kelajakda insonning o'rtacha umr ko'rish ko'rsatkichini yuz yoshdan osongina oshirishini anglatadi.</p>` },
            { id: 20, title: "21. Sotsiologiya: Ommaviy Ong", category: 3,
              content: `<p>Sotsiologiya insonlarning o'zaro munosabatlarini, jamiyat qanday shakllanishini va uning qanday qonuniyatlar asosida rivojlanishini o'rganuvchi fandir. Biz ko'pincha o'z qarorlarimizni mutlaqo mustaqil qabul qilamiz deb o'ylaymiz, ammo sotsiologik tadqiqotlar shuni ko'rsatadiki, bizning didimiz, e'tiqodimiz va hatto kelajakdagi maqsadlarimiz ham biz yashayotgan jamiyat tomonidan oldindan dasturlashtirilgan bo'ladi. Jamiyat — bu ko'rinmas qoidalar va ijtimoiy normalar ustiga qurilgan ulkan mexanizmdir.</p><p>Ommaviy ong (Mass consciousness) tushunchasi axborot asrida ayniqsa dolzarb ahamiyat kasb etmoqda. Odamlar guruh bo'lib harakat qilganda, ularning individual mantiqiy fikrlashi susayib, hissiyotlarga asoslangan "stada" (poda) instinkti ishga tushadi. Tarixdagi eng katta inqiloblar ham, eng fojiali xatolar ham aynan ommaviy ongning manipulyatsiya qilinishi natijasida yuz bergan. Propaganda va ommaviy axborot vositalari insonlar miyasiga muayyan g'oyalarni xuddi ularning o'z shaxsiy fikridek qilib singdira oladi.</p><p>Konformizm — ko'pchilikning fikriga ko'r-ko'rona ergashish psixologiyasi jamiyatning barqarorligini ta'minlasa-da, uning rivojlanishiga eng katta to'siq hamdir. Mashhur Asch eksperimenti shuni isbotlaganki, agar xonadagi ko'pchilik oq narsani "qora" deb tursa, oddiy inson ham o'z ko'ziga ishonmay, ko'pchilikka qo'shilishga majbur bo'ladi. Jamiyatdan ajralib qolish qo'rquvi inson tabiatidagi eng kuchli biologik qo'rquvlardan biridir.</p><p>Bugungi kunda ijtimoiy tarmoqlar ommaviy ongni shakllantiruvchi eng qudratli qurolga aylandi. Algoritmlar bizga faqat bizning fikrimizni tasdiqlovchi ma'lumotlarni ko'rsatib, "aks-sado xonalari" (echo chambers) ni yaratadi. Natijada, jamiyat turli xil qarama-qarshi qutblarga ajralib qoladi.</p><p>Haqiqiy intellektual erkinlik — bu o'z guruhining ishonchlarini shubha ostiga ola bilish va xolis axborot asosida mustaqil fikr yurita olish qobiliyatidir.</p>` },
            { id: 21, title: "22. Kino San'ati Tarixi", category: 3,
              content: `<p>Kino — bu insoniyat kashf etgan san'at turlarining eng yoshi, ammo eng ta'sirchanidir. XIX asr oxirida aka-uka Lyumyerlar tomonidan namoyish etilgan "Poyezdning yetib kelishi" nomli qisqa metrajli ovozsiz videodan tortib, bugungi kundagi milliard dollarlik byudjetga ega Gollivud blokbasterlarigacha bo'lgan yo'l — texnologiya va inson xayolotining ajoyib evolyutsiyasidir. Kino faqatgina vaqtichog'lik vositasi emas, u davrning ruhiyatini, madaniyatini va muammolarini aks ettiruvchi vizual oynadir.</p><p>Kinematografiyaning haqiqiy sehri montaj jarayonida yashiringan. Mashhur "Kuleshov effekti" shuni ko'rsatadiki, ikkita bir-biriga bog'liq bo'lmagan kadrni ketma-ket qo'yish orqali tomoshabinda mutlaqo uchinchi, yangi ma'no va hissiyot uyg'otish mumkin. Masalan, aktyorning neytral yuz ifodasidan so'ng issiq sho'rva ko'rsatilsa, tomoshabin uni "och qolgan" deb o'ylaydi, agar bolaning jasadi ko'rsatilsa, "qayg'urmoqda" deb qabul qiladi.</p><p>Rejissyorlar va operatorlar yorug'lik, kamera burchaklari va ranglar palitrasi orqali bizning ongosti tuyg'ularimizni boshqaradilar. Ovoz va musiqaning kinoga kirib kelishi uning ta'sir kuchini o'n barobar oshirdi. Filmdagi vizual qism bizning aql-idrokimizga murojaat qilsa, uning saundtreki va audio effektlari (Foley san'ati) to'g'ridan-to'g'ri yuragimizga nishonga uradi.</p><p>Ko'pincha, filmdagi eng qo'rqinchli yoki hayajonli sahnalar ekranda nima ko'rsatilayotgani bilan emas, balki orqa fonda qanday musiqa yangrayotgani bilan belgilanadi. Raqamli texnologiyalar va CGI (kompyuter grafikasi) kino sarhadlarini cheksizlikkacha kengaytirdi. Endilikda rejissyorlar o'z tasavvuridagi istalgan g'ayritabiiy olamni o'ta realistik tarzda ekranga olib chiqa oladilar.</p><p>Strining xizmatlarining (Netflix, HBO) ommalashuvi kino sanoatini inqirozga uchratadi, degan xavotirlarga qaramay, odamlar haligacha yirik ekranlarda, ommaviy tarzdagi hissiy tajribani his qilish uchun kinoteatrlarga borishda davom etmoqdalar. Kino — g'oyalar bilan bo'lishishning eng universal tilidir.</p>` },
            { id: 22, title: "23. Arxitektura va Estetika", category: 3,
              content: `<p>Arxitektura shunchaki odamlarni sovuqdan yoki yomg'irdan himoya qiluvchi to'rt devor va tomdan iborat emas. U muhandislik, san'at va psixologiyaning mukammal kesishuv nuqtasidir. Qadimgi faylasuflar arxitekturani "muzlagan musiqa" deb atashgan, chunki undagi proporsiyalar, ritm va garmoniya xuddi musiqiy asardek inson ruhiyatiga sokinlik yoxud jo'shqinlik baxsh eta oladi. Biz qanday binolarda yashashimiz va ishlashimiz bizning fikrlash tarzimizga to'g'ridan-to'g'ri ta'sir ko'rsatadi.</p><p>Arxitektura tarixi insoniyat sivilizatsiyasining tarixidir. Qadimgi Misr ehromlarining ulug'vorligi fir'avnlarning ilohiy kuchini namoyish etishga qaratilgan bo'lsa, Gotika cherkovlarining osmonga sanchilgan uchli gumbazlari insonni Yaratganga yaqinroq bo'lish intilishini aks ettirgan. XX asrga kelib, "Shakl funksiyaga ergashadi" degan tamoyil o'rtaga chiqdi va ortiqcha bezaklardan xoli, shisha hamda betondan iborat zamonaviy osmono'par binolar arxitekturasi dunyo shaharlarining qiyofasini butunlay o'zgartirib yubordi.</p><p>Urbanistika — shaharlarni loyihalash fani bugungi kunning eng dolzarb masalalaridan biridir. O'tgan asrda shaharlar asosan avtomobillar uchun loyihalashtirilgan bo'lsa, endilikda zamonaviy arxitektorlar "odamlar uchun shaharlar" konsepsiyasiga qaytmoqdalar. Yashil bog'lar, keng piyodalar yo'laklari, velosiped infratuzilmasi va jamoat joylari shahar aholisining baxt darajasini va ijtimoiy faolligini belgilab beruvchi asosiy faktorlarga aylandi.</p><p>Kelajak arxitekturasi barqarorlik va ekologiya tamoyillariga asoslanadi. Karbonat angidrid yutuvchi betonlar, 3D printerlarda chop etiladigan uylar va tabiat bilan uyg'unlashgan "biofilik dizayn" (Biophilic design) texnologiyalari faol qo'llanilmoqda.</p><p>Bino endilikda shunchaki jonsiz obyekt emas, balki o'zining energiyasini o'zi ishlab chiqaruvchi, ob-havoga qarab haroratni moslashtiruvchi va tabiat bilan nafas oluvchi aqlli organizmga aylanib bormoqda.</p>` },
            { id: 23, title: "24. Global Logistika", category: 3,
              content: `<p>Siz ushbu matnni o'qib turgan smartfoningiz qanday yaratilgani haqida hech o'ylab ko'rganmisiz? Uning ekrani Koreyada ishlangan, protsessori Tayvanda yasalgan, akkumulyatoridagi litiy Afrikadan qazib olingan, dizayni AQShda chizilgan va yakunda Xitoyda yig'ilib, sizning qo'lingizga yetib kelgan. Bu murakkab zanjir — global logistika va savdo tizimining mo'jizasi hisoblanadi. Logistika jahon iqtisodiyotining ko'rinmas qon tomirlari bo'lib, uning bir soniya to'xtab qolishi butun dunyo bozorlarini falaj qiladi.</p><p>Zamonaviy globallashuvning eng katta qahramoni bu internet emas, balki oddiy metall konteynerdir (Shipping container). 1950-yillarda standartlashtirilgan yuk konteynerlarining kashf qilinishi yuklarni kemadan poyezdga, u yerdan esa yuk mashinalariga ortish jarayonini yuz barobar tezlashtirdi va arzonlashtirdi. Aynan shu ixtiro sababli, Xitoyda ishlab chiqarilgan buyumni Yevropaga olib borish uning tannarxiga deyarli ta'sir qilmaydigan darajaga keldi.</p><p>Zamonaviy yetkazib berish zanjirlari "Just-in-Time" (Ayni vaqtida) falsafasiga qurilgan. Zavodlar o'z omborlarida oylik zaxiralarni saqlamaydilar, ehtiyot qismlar konveyerga aynan kerak bo'lgan daqiqalardagina yetib keladi. Bu tizim o'ta samarali bo'lsa-da, uning qanchalik zaif ekanligini Suvaysh kanalida bitta kemaning (Ever Given) tiqilib qolishi va global savdoga kuniga milliardlab dollar zarar keltirishi yaqqol ko'rsatib berdi.</p><p>Kelajak logistikasi to'liq avtomatlashtirishga qarab ketmoqda. Odamlarsiz ishlaydigan ulkan robotlashtirilgan portlar, yuklarni havoda tashiydigan dronlar va ob-havo hamda tirbandliklarni hisobga olib eng maqbul yo'nalishni chizib beruvchi sun'iy intellekt tizimlari joriy qilinmoqda.</p><p>Savdo yo'llari faqatgina iqtisodiyot emas, balki global geosiyosiy qudratni ham belgilab beradi. Kim savdo yo'llarini nazorat qilsa, dunyo o'shaning qoidalari asosida o'ynaydi.</p>` },
            { id: 24, title: "25. Diplomatiya: Yumshoq Kuch", category: 3,
              content: `<p>Insoniyat tarixi qonli urushlar bilan to'la bo'lsa-da, bugungi kunda dunyoni ushlab turgan narsa qurol emas, balki so'z va kelishuvlardir. Diplomatiya — bu davlatlar o'rtasidagi manfaatlarni tinch yo'l bilan hal etish, nizo va ziddiyatlarning oldini olish san'ati hisoblanadi. Usta diplomat uchinchi Jahon urushini bitta to'g'ri tashkil etilgan muzokara stoli atrofida to'xtatib qolishga qodir. Siyosat bu kimning haqligini aniqlash emas, balki mumkin bo'lgan natijalarga erishish mahoratidir.</p><p>Xalqaro munosabatlarda "Qattiq kuch" (Harbiy va iqtisodiy bosim) va "Yumshoq kuch" (Soft power) tushunchalari mavjud. Zamonaviy dunyoda davlatning qudrati uning tanklari soni bilan emas, balki madaniyati, ta'lim tizimi, texnologiyalari va qadriyatlari qanchalik jozibador ekanligi bilan o'lchanadi. Bir davlatning musiqasi, kinosi, kiyinish uslubi va brendlarining butun dunyoda sevib iste'mol qilinishi — eng kuchli diplomatik g'alabadir.</p><p>BMT (Birlashgan Millatlar Tashkiloti), Jahon Savdo Tashkiloti kabi xalqaro institutlar va minglab ikki tomonlama shartnomalar dunyo tartibotini (World Order) saqlab turuvchi ko'rinmas arqonlardir. Xalqaro siyosatda O'yinlar Nazariyasi (Game Theory) keng qo'llaniladi. Bu shunday matematik modelki, unda bir davlatning qarori boshqa davlatning ehtimoliy javob reaksiyasini hisobga olgan holda qabul qilinadi va optimal muvozanat izlanadi (masalan, Yadroviy tiyib turish tamoyili).</p><p>Axborot asrida diplomatiya o'z shaklini o'zgartirdi. Maxfiy yozishmalar va yopiq eshiklar ortidagi suhbatlar o'rnini endilikda "Raqamli diplomatiya" (Twitter diplomatiyasi) egallamoqda. Davlat rahbarlari o'z xabarlarini bevosita butun dunyo aholisiga yetkazish imkoniyatiga ega.</p><p>Siyosat qanchalik murakkab va ba'zan shafqatsiz ko'rinmasin, uning tub maqsadi bitta — tsivilizatsiyaning barqarorligini va xavfsiz rivojlanishini ta'minlashdir.</p>` },
            { id: 25, title: "26. Mifologiya: Qadimgi Sirlar", category: 3,
              content: `<p>Insoniyat o'zining butun tarixi davomida atrof-muhitdagi tushunarsiz hodisalarni anglashga intilgan. Qadimgi dunyo odamlari uchun chaqmoq, zilzila yoki quyosh tutilishi shunchaki tabiat hodisasi emas, balki ilohiy kuchlarning g'azabi yoki ishorasi bo'lib tuyulgan. Mifologiya — qadimgi insonlarning koinot, hayot va o'lim haqidagi ibtidoiy, ammo o'ta murakkab tasavvurlari majmuasidir. Yunon, Skandinaviya va Misr mifologiyalari bugungi kungacha jahon madaniyati va adabiyotining ajralmas qismi bo'lib qolmoqda.</p><p>Qadimgi Yunoniston afsonalaridagi Zevs, Poseydon va Afina kabi xudolar shunchaki ilohlar emas, balki insoniy nuqsonlar va ehtiroslarga ega bo'lgan obrazlardir. Ular orqali yunonlar adolat, qasos, jasorat va xiyonat kabi axloqiy tushunchalarni tushuntirishgan. Gomerning "Iliada" va "Odisseya" dostonlari og'zaki ijodning eng yuksak cho'qqisi bo'lib, ular orqali biz qadimgi davr odamlarining qahramonlik va fojia haqidagi tasavvurlarini o'rganamiz. Miflar bu shunchaki ertak emas, u insoniyatning kollektiv ongosti xotirasidir.</p><p>Skandinaviya mifologiyasi esa o'zining qattiqqo'lligi va fojiali oxiri (Ragnarok — dunyoning oxiri) bilan ajralib turadi. Odin, Tor va Loki kabi xudolar doimiy muzliklar va qattiq iqlim sharoitida yashovchi vinkinglar madaniyatining yaqqol aksidir. Ular qismatdan qochib qutulib bo'lmasligiga va haqiqiy jangchi jang maydonida halok bo'libgina Valxallaga tushishiga ishonishgan. Bu e'tiqod ularni dunyodagi eng qo'rqmas dengizchilarga aylantirgan.</p><p>Bugungi kunda mifologik obrazlar kino, adabiyot va video o'yinlar sanoatida faol qo'llanilmoqda. Psixolog Karl Yungning ta'kidlashicha, barcha madaniyatlarning afsonalarida uchraydigan o'xshash arxetiplar (Masalan: Dono qariya, Qahramon, Yovuz maxluq) inson miyasining chuqur qatlamlariga kodlangan universal tushunchalardir.</p><p>Qadimgi dunyo sirlarini o'rganish bizga zamonaviy inson psixologiyasini yaxshiroq tushunishga yordam beradi. Miflar orqali biz o'zligimizni anglashga yaqinlashamiz.</p>` },
            { id: 26, title: "27. Biologik Xilma-xillik", category: 3,
              content: `<p>Yer sayyorasi koinotdagi hozircha bizga ma'lum bo'lgan yagona tiriklik maskanidir. Bu tiriklikning eng katta mo'jizasi uning cheksiz xilma-xilligidadir. Biologik xilma-xillik (Biodiversitet) — bu mikroskopik bakteriyalardan tortib, bahaybat ko'k kitlargacha bo'lgan barcha tirik organizmlarning va ular yashaydigan ekotizimlarning o'zaro murakkab tarmog'idir. Tabiatdagi hech bir tur ortiqcha emas, ularning har biri bu ulkan biologik zanjirda o'zining o'rnini to'ldirib turadi.</p><p>Ekotizimlar xuddi jenga (Jenga) o'yiniga o'xshaydi. Agar siz bitta kichik yog'och bo'lagini sug'urib olsangiz, butun minora qulab tushishi mumkin. Masalan, asalarilar va boshqa changlatuvchi hasharotlarning qirilib ketishi insoniyatning oziq-ovqat xavfsizligiga to'g'ridan-to'g'ri tahdid soladi, chunki biz iste'mol qiladigan meva va sabzavotlarning uchdan bir qismi aynan ularga bog'liq. Bo'rilarning Yelloustoun milliy parkiga qaytarilishi u yerdagi daryolar oqimini va butun flora va faunani qanday ijobiy tomonga o'zgartirgani tabiat muvozanatining ajoyib namunasidir.</p><p>Afsuski, inson faoliyati natijasida bugungi kunda turlarning qirilib ketish sur'ati tabiiy holatdan minglab barobar tezlashgan. O'rmonlarning kesilishi, okeanlarning plastik bilan ifloslanishi va iqlim o'zgarishi sayyoramizning oltinchi ommaviy qirilish davriga (Sixth Mass Extinction) kirganidan dalolat bermoqda. Har kuni o'nlab o'simlik va hayvon turlari ilm-fanga ma'lum bo'lishga ham ulgurmasdan yer yuzidan yo'qolib bormoqda.</p><p>Biologik xilma-xillikni asrab qolish nafaqat tabiatga nisbatan axloqiy burchimiz, balki o'zimizning yashab qolishimiz uchun asosiy shartdir. Zamonaviy tibbiyotdagi ko'plab dorilar, jumladan, antibiotiklar va saratonga qarshi vositalar aynan yovvoyi tabiatdan (o'simliklar va zamburug'lardan) olinadi.</p><p>Tabiat bizning eng katta dorixonamiz va ilhom manbayimizdir. Uni vayron qilish — o'zimiz o'tirgan shoxga bolta urish bilan tengdir.</p>` },
            { id: 27, title: "28. Koinotni O'zlashtirish", category: 3,
